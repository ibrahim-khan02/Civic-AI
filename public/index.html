<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CivicAI</title>

  <!-- Bootstrap CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

<div class="container py-5">

  <!-- Header -->
  <div class="text-center mb-5">
    <h1 class="fw-bold text-primary">CivicAI</h1>
    <p class="text-muted">Smart Complaint Management System</p>
  </div>
  <div class="row text-center mb-4">

  <div class="col-md-3">
    <div class="card shadow-sm">
      <div class="card-body">
        <h6>Total</h6>
        <h4 id="totalCount">0</h4>
      </div>
    </div>
  </div>

  <div class="col-md-3">
    <div class="card shadow-sm">
      <div class="card-body">
        <h6>High Priority</h6>
        <h4 id="highCount" class="text-danger">0</h4>
      </div>
    </div>
  </div>

  <div class="col-md-3">
    <div class="card shadow-sm">
      <div class="card-body">
        <h6>Pending</h6>
        <h4 id="pendingCount" class="text-warning">0</h4>
      </div>
    </div>
  </div>

  <div class="col-md-3">
    <div class="card shadow-sm">
      <div class="card-body">
        <h6>Resolved</h6>
        <h4 id="resolvedCount" class="text-success">0</h4>
      </div>
    </div>
  </div>

</div>

  <div class="row g-4">

    <!-- Complaint Form -->
    <div class="col-md-6">
      <div class="card shadow-sm">
        <div class="card-body">
          <h5 class="card-title">Submit Complaint</h5>

          <input type="text" id="complaintText" class="form-control mb-3" placeholder="Enter your complaint...">

          <button class="btn btn-primary w-100" onclick="submitComplaint()">
            Submit Complaint
          </button>
        </div>
      </div>
    </div>

    <!-- Chatbot -->
    <div class="col-md-6">
      <div class="card shadow-sm">
        <div class="card-body">
          <h5 class="card-title">Chat Assistant</h5>

          <div id="chatbox" class="border rounded p-2 mb-3" style="height:200px; overflow-y:auto;"></div>

          <div class="input-group">
            <input type="text" id="userInput" class="form-control" placeholder="Ask about Complaints / Status / Types / Urgent ">
            <button class="btn btn-success" onclick="sendMessage()">Send</button>
          </div>

        </div>
      </div>
    </div>

  </div>
  

  <!-- Complaint List -->
  <div class="card shadow-sm mt-5">
    <div class="card-body">
      <h5 class="card-title">All Complaints</h5>
      <ul id="list" class="list-group"></ul>
    </div>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
